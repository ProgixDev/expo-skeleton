# Supabase CLI config (template). Run `supabase init` to regenerate the full
# file for your environment; the security-relevant override is below.
project_id = "expo-skeleton"

[functions.revenuecat-webhook]
# The webhook carries no Supabase JWT — it authenticates with a shared secret
# header that the function verifies itself. Do NOT enable verify_jwt here.
verify_jwt = false
