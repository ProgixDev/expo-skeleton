# Supabase CLI config (template). Run `supabase init` to regenerate the full
# file for your environment; the security-relevant override is below.
project_id = "expo-skeleton"

[functions.revenuecat-webhook]
# The webhook carries no Supabase JWT — it authenticates with a shared secret
# header that the function verifies itself. Do NOT enable verify_jwt here.
verify_jwt = false

[functions.delete-account]
# Called by a signed-in user — require a valid Supabase JWT (the default).
verify_jwt = true

# The driver functions below authenticate with the Linky SELF-ROLLED JWT (issued by
# otp-verify), NOT a Supabase Auth session. The Supabase gateway can't verify an
# app-issued JWT, so verify_jwt MUST be false here; each function verifies the token
# in-function via requireUser() (_shared/auth.ts) and derives livreur_id from its `sub`.
# This matches the live Linky backend. The client sends Authorization: Bearer <access
# token> + the anon key in `apikey`.

[functions.list-livreur-deliveries]
# Signed-in driver's active deliveries (spec 001). Identity from the self-rolled JWT,
# never from the request body (AC-9). Deploy DEFERRED (no Supabase access here).
verify_jwt = false

[functions.get-delivery]
# ONE delivery's full detail for the assigned driver (spec 002). The in-function
# requireUser() scopes the read to livreur_id = caller (full address + buyer name revealed
# only for the driver's own assigned delivery — AC-9). Deploy DEFERRED.
verify_jwt = false

[functions.livreur-confirm-handoff]
# The irreversible money action (spec 002): scan-confirm a handoff → release escrow. The
# livreur id is derived from the self-rolled JWT and passed to the service-role RPC, never
# from the request body (AC-9). This function ALSO exists in the canonical Linky backend
# (same self-rolled-JWT auth). Deploy DEFERRED.
verify_jwt = false
