name: Release (store builds)

# Tag-driven production release: vX.Y.Z tags trigger production builds with
# auto-submit to both stores, plus an auto-generated GitHub Release whose
# notes come from Conventional Commits. Runbook: docs/runbooks/release.md

on:
  push:
    tags: ['v*.*.*']

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install
        run: npm ci

      - name: Production builds (auto-submit)
        run: eas build --platform all --profile production --auto-submit --non-interactive --no-wait

      - name: GitHub Release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
