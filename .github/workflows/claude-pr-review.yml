name: AI persona review

# Persona-based review on every PR, powered by Claude Code (your team's
# subscription via CLAUDE_CODE_OAUTH_TOKEN, or ANTHROPIC_API_KEY).
# Setup: install the Claude GitHub App + add the secret —
# docs/runbooks/repo-setup.md

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude persona review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Alternatively: anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the review board defined in .claude/agents/code-reviewer.md.
            Review this pull request's diff by adopting, in order, every
            persona in docs/personas/ (read each file first):
            frontend-architect, ux-reviewer, security-engineer,
            performance-engineer, qa-engineer.

            Post ONE review comment on the PR (use the GitHub tools) with:
            - findings per persona as `[P1|P2|P3] file:line — issue — fix`
              (skip personas with no findings)
            - `## Verdict:` APPROVE / APPROVE-WITH-NITS / REQUEST-CHANGES
              (any P1 ⇒ REQUEST-CHANGES)
            - `## HARNESS:` the lint rule / test / doc change that would
              prevent any recurring finding permanently
            - one thing genuinely done well

            Check the PR body against .github/PULL_REQUEST_TEMPLATE.md:
            missing proof of work is a P1. Do not approve formally — humans
            keep merge authority.
          claude_args: |
            --allowedTools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*)"
            --model claude-sonnet-4-6
