name: E2E iOS (Maestro)

# Deterministic E2E gate: builds the dev-variant app on a simulator and runs
# the Maestro flows in .maestro/flows. Heavy job — path-filtered and
# concurrency-capped. EAS-native alternative: .eas/workflows/e2e-maestro.yml

on:
  pull_request:
    paths:
      - 'src/**'
      - '.maestro/**'
      - 'app.config.ts'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  maestro-ios:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      APP_VARIANT: development # bundle id com.yourcompany.skeleton.dev — matches flow appId
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Prebuild (CNG)
        run: npx expo prebuild --platform ios --no-install

      - name: Pods
        run: cd ios && pod install

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; print(next(dev['udid'] for k,v in d.items() if 'iOS' in k for dev in v if 'iPhone' in dev['name']))")
          xcrun simctl boot "$UDID" || true
          echo "UDID=$UDID" >> "$GITHUB_ENV"

      - name: Build & install app on simulator
        run: npx expo run:ios --configuration Release --device "$UDID" --no-bundler || npx expo run:ios --configuration Release

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run flows
        run: maestro test .maestro/flows --format junit --output maestro-report.xml

      - name: Upload Maestro artifacts (screenshots, logs, report)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts
          path: |
            maestro-report.xml
            ~/.maestro/tests/
          retention-days: 14
