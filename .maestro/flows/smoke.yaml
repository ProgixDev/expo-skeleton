# Smoke test: app boots and renders the home screen.
# Run locally: npm run e2e:ios (requires `maestro` CLI + a booted simulator
# with the app installed). CI runs this on every PR via e2e-ios.yml.
appId: com.yourcompany.skeleton.dev
---
- launchApp
- assertVisible:
    id: 'tasks-screen'
- assertVisible:
    id: 'tasks-empty'
